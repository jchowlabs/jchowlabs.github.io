name = "agent-guardrails-lab"
main = "src/index.js"
compatibility_date = "2024-09-23"

[durable_objects]
bindings = [
  { name = "LAB_SESSION", class_name = "LabSession" },
  { name = "LAB_SESSION_SECURE", class_name = "LabSessionSecure" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LabSession"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["LabSessionSecure"]

[vars]
OPENAI_MODEL = "gpt-4o-mini"
